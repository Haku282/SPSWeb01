services:
  db:
    image: mysql:8.0
    container_name: smartpharma_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartpharma
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ./ai-service
    container_name: smartpharma_ai
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/smartpharma
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: smartpharma_backend
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: smartpharma
      DB_PORT: 3306
      SESSION_SECRET: smartpharma_local_secret
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/spsver1
    container_name: smartpharma_frontend
    ports:
      - "3000:3000"
    depends_on:
      - ai-service
      - backend

volumes:
  db_data:
